{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Регистрация</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" required>
                        <small class="text-muted">Введите ваш рабочий email</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">ФИО *</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Пароль *</label>
                        <input type="password" name="password" class="form-control" required>
                        <small class="text-muted">Минимум 6 символов</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля *</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-check-circle"></i> Зарегистрироваться
                    </button>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="mb-0">Уже есть аккаунт?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
